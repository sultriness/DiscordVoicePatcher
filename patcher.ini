; Discord Voice Node Patcher
; Scans discord_voice.node in memory using byte patterns — no RVAs needed.
; On Discord update: restart Discord. Patterns auto-resolve.
; If a pattern breaks after a major update, update it here. No recompile needed.
;
; pattern       = AA BB ?? CC    ; ?? = wildcard byte
; sig_offset    = N              ; bytes from pattern match start to patch site
; alt_pattern   = AA BB ?? CC    ; fallback pattern if primary fails
; alt_offset    = N              ; sig_offset for alt_pattern
; derive_from   = SectionName    ; derive patch site from another section's result
; derive_offset = 0xN            ; signed byte offset added to the anchor site
; expected      = AA BB          ; bytes that must exist before patching (safety check)
; patch         = CC DD          ; bytes to write

; ── Stereo ──────────────────────────────────────────────────────────────────

[EmulateStereoSuccess1]
; CommitAudioCodec: channel count 1 → 2
; Most critical anchor — 5 patches derive from this
pattern     = E8 ?? ?? ?? ?? BD ?? 00 00 00 80 BC 24 80 01 00 00 01
sig_offset  = 6
alt_pattern = E8 ?? ?? ?? ?? BD ?? 00 00 00 80 BC 24 ?? ?? 00 00 01
alt_offset  = 6
expected    = 01
patch       = 02

[EmulateStereoSuccess2]
; CommitAudioCodec: jne → jmp (always take stereo path)
; Derived from EmulateStereoSuccess1 + 0xC
derive_from   = EmulateStereoSuccess1
derive_offset = 0xC
alt_derive_offset = 0x1
expected      = 75
patch         = EB

[CreateAudioFrameStereo]
; CreateAudioFrameToProcess: cmovae r13,rax → mov r13,rax + nop
pattern     = B8 80 BB 00 00 BD 00 7D 00 00 0F 43 E8
sig_offset  = 31
alt_pattern = B8 80 BB 00 00 BD 00 7D 00 00 0F ?? E8
alt_offset  = 31
expected    = 4C 0F 43 E8
patch       = 49 89 C5 90

[AudioEncoderOpusConfigSetChannels]
; AudioEncoderOpusConfig constructor: channels 1 → 2
; Also an anchor — EncoderConfigInit1 and AudioEncoderOpusConfigIsOk derive from this
pattern     = 48 B9 14 00 00 00 80 BB 00 00 48 89 08 48 C7 40 08 ?? 00 00 00
sig_offset  = 17
alt_pattern = 48 B9 14 00 00 00 80 BB 00 00 48 89 08 48 C7 40 ?? ?? 00 00 00
alt_offset  = 17
expected    = 01
patch       = 02

; ── Sample Rate ──────────────────────────────────────────────────────────────

[Emulate48Khz]
; CommitAudioCodec: cmovb → NOPs (force 48kHz path always)
derive_from   = EmulateStereoSuccess1
derive_offset = 0x168
expected      = 0F 42 C1
patch         = 90 90 90

; ── Bitrate ──────────────────────────────────────────────────────────────────

[EmulateBitrateModified]
; CommitAudioCodec: imul constant 32000 → 384000 bps
derive_from   = EmulateStereoSuccess1
derive_offset = 0x45F
expected      = 00 7D 00
patch         = 00 DC 05

[HighPassFilter]
; webrtc::AudioProcessingImpl::InitializeHighPassFilter: ret immediately
derive_from   = EmulateStereoSuccess1
derive_offset = 0xC275
expected      = 41
patch         = C3

[SetsBitrateBitrateValue]
; Bitrate setter movabs: 32000 → 384000 bps
pattern     = 89 F8 48 B9 ?? ?? ?? ?? 01 00 00 00 48 09 C1 48 89 4E 1C
sig_offset  = 4
alt_pattern = 89 F8 48 B9 ?? ?? ?? ?? 01 00 00 00 48 09 C1 48 89 ?? ??
alt_offset  = 4
expected    =
patch       = 00 DC 05 00 00

[SetsBitrateBitwiseOr]
; or rcx,rax → NOPs
derive_from   = SetsBitrateBitrateValue
derive_offset = 0x8
expected      = 48 09 C1
patch         = 90 90 90

; ── Encoder Config ────────────────────────────────────────────────────────────

[EncoderConfigInit1]
; AudioEncoderOpusConfig: packed qword 32000 → 384000 bps (first)
derive_from   = AudioEncoderOpusConfigSetChannels
derive_offset = 0xA
expected      = 00 7D 00 00
patch         = 00 DC 05 00

[EncoderConfigInit2]
; AudioEncoderOpusConfig constructor: packed qword 32000 → 384000 bps (second)
pattern     = 48 B9 ?? ?? ?? ?? ?? ?? ?? ?? 48 89 48 10 66 C7 40 18 00 00 C6 40 1A 00
sig_offset  = 6
alt_pattern = 48 B9 ?? ?? ?? ?? ?? ?? ?? ?? 48 89 48 ?? 66 C7 40 ?? 00 00 C6 40 ?? 00
alt_offset  = 6
expected    = 00 7D 00 00
patch       = 00 DC 05 00

[AudioEncoderOpusConfigIsOk]
; AudioEncoderOpusConfig::IsOk: always return true
derive_from       = AudioEncoderOpusConfigSetChannels
derive_offset     = 0x29C
alt_derive_offset = 0x19B
expected          = 8B 11 31 C0
patch             = 48 C7 C0 01 00 00 00 C3

; ── Downmix / Filters ────────────────────────────────────────────────────────

[MonoDownmixer]
; CapturedAudioProcessor::Process: NOP sled to skip mono downmix gate
pattern     = 48 89 F9 E8 ?? ?? ?? ?? 84 C0 74 0D 83 BE ?? ?? 00 00 09 0F 8F
sig_offset  = 8
alt_pattern = 48 89 ?? E8 ?? ?? ?? ?? 84 C0 ?? ?? 83 ?? ?? ?? 00 00 09 0F 8F
alt_offset  = 8
expected    = 84 C0
patch       = 90 90 90 90 90 90 90 90 90 90 90 90 E9

[ThrowError]
; Environment::Throw: ret immediately
pattern     = 56 56 57 53 48 81 EC C8 00 00 00 0F 29 B4 24 B0 00 00 00 4C 89 CE 4C 89 C7 89 D3
sig_offset  = -1
alt_pattern = 56 56 57 53 48 81 EC ?? ?? 00 00 0F 29 B4 24 ?? ?? 00 00 4C 89 CE 4C 89 C7 89 D3
alt_offset  = -1
expected    = 41
patch       = C3

[DownmixFunc]
; downmix_and_resample: ret immediately
pattern     = 57 41 56 41 55 41 54 56 57 55 53 48 83 EC 10 48 89 0C 24 45 85 C0
sig_offset  = -1
alt_pattern = 57 41 56 41 55 41 54 56 57 55 53 48 83 EC ?? 48 89 0C 24 45 85 C0
alt_offset  = -1
expected    = 41
patch       = C3

