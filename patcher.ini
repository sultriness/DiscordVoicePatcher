; Discord Voice Node Patcher
; Scans discord_voice.node in memory using byte patterns — no RVAs needed.
; On Discord update: restart Discord. If patterns break, update them here.
; No recompile ever needed.
;
; pattern       = AA BB ?? CC    ; ?? = wildcard byte
; sig_offset    = N              ; bytes from pattern match start to patch site
; derive_from   = SectionName    ; derive patch site from another section's result
; derive_offset = 0xN            ; signed byte offset added to the anchor site
; expected      = AA BB          ; bytes that must exist before patching (safety check)
; patch         = CC DD          ; bytes to write

; ── Stereo ──────────────────────────────────────────────────────────────────

[EmulateStereoSuccess1]
; CommitAudioCodec: channel count 1 → 2
pattern    = E8 ?? ?? ?? ?? BD ?? 00 00 00 80 BC 24 80 01 00 00 01
sig_offset = 6
expected   = 01
patch      = 02

[EmulateStereoSuccess2]
; CommitAudioCodec: jne → jmp (always take stereo path)
derive_from   = EmulateStereoSuccess1
derive_offset = 0xC
expected      = 75
patch         = EB

[CreateAudioFrameStereo]
; CreateAudioFrameToProcess: cmovae r13,rax → mov r13,rax + nop (channel count)
pattern    = B8 80 BB 00 00 BD 00 7D 00 00 0F 43 E8
sig_offset = 31
expected   = 4C 0F 43 E8
patch      = 49 89 C5 90

[AudioEncoderOpusConfigSetChannels]
; AudioEncoderOpusConfig constructor: channels 1 → 2
pattern    = 48 B9 14 00 00 00 80 BB 00 00 48 89 08 48 C7 40 08 ?? 00 00 00
sig_offset = 17
expected   = 01
patch      = 02

; ── Sample Rate ──────────────────────────────────────────────────────────────

[Emulate48Khz]
; CommitAudioCodec: cmovb → NOPs (force 48kHz path always)
derive_from   = EmulateStereoSuccess1
derive_offset = 0x168
expected      = 0F 42 C1
patch         = 90 90 90

; ── Bitrate ──────────────────────────────────────────────────────────────────

[EmulateBitrateModified]
; CommitAudioCodec: imul constant 32000 → 384000 bps
derive_from   = EmulateStereoSuccess1
derive_offset = 0x45F
expected      = 00 7D 00
patch         = 00 DC 05

[SetsBitrateBitrateValue]
; Bitrate setter movabs: lower 32 bits 32000 → 384000 bps
pattern    = 89 F8 48 B9 ?? ?? ?? ?? 01 00 00 00 48 09 C1 48 89 4E 1C
sig_offset = 4
expected   =
patch      = 00 DC 05 00 00

[SetsBitrateBitwiseOr]
; Bitrate OR: or rcx,rax → NOPs (disabled since movabs now carries full bitrate)
derive_from   = SetsBitrateBitrateValue
derive_offset = 0x8
expected      = 48 09 C1
patch         = 90 90 90

; ── Encoder Config ────────────────────────────────────────────────────────────

[EncoderConfigInit1]
; AudioEncoderOpusConfig: packed qword 32000 → 384000 bps (first occurrence)
derive_from   = AudioEncoderOpusConfigSetChannels
derive_offset = 0xA
expected      = 00 7D 00 00
patch         = 00 DC 05 00

[EncoderConfigInit2]
; AudioEncoderOpusConfig constructor: packed qword 32000 → 384000 bps (second)
pattern    = 48 B9 ?? ?? ?? ?? ?? ?? ?? ?? 48 89 48 10 66 C7 40 18 00 00 C6 40 1A 00
sig_offset = 6
expected   = 00 7D 00 00
patch      = 00 DC 05 00

[AudioEncoderOpusConfigIsOk]
; AudioEncoderOpusConfig::IsOk: always return true (config always valid)
derive_from   = AudioEncoderOpusConfigSetChannels
derive_offset = 0x29C
expected      = 8B 11 31 C0
patch         = 48 C7 C0 01 00 00 00 C3

; ── Downmix / Filters ────────────────────────────────────────────────────────

[MonoDownmixer]
; CapturedAudioProcessor::Process: NOP sled to skip mono downmix gate
pattern    = 48 89 F9 E8 ?? ?? ?? ?? 84 C0 74 0D 83 BE ?? ?? 00 00 09 0F 8F
sig_offset = 8
expected   = 84 C0
patch      = 90 90 90 90 90 90 90 90 90 90 90 90 E9

[ThrowError]
; discord::node_api::Environment::Throw: ret immediately (suppress error throws)
pattern    = 41 56 56 57 53 48 81 EC C8 00 00 00 0F 29 B4 24 B0 00 00 00 4C 89 CE 4C 89 C7 89 D3
sig_offset = 0
expected   = 41
patch      = C3

[DownmixFunc]
; downmix_and_resample: ret immediately (disable downmix entirely)
pattern    = 41 57 41 56 41 55 41 54 56 57 55 53 48 83 EC 10 48 89 0C 24 45 85 C0
sig_offset = 0
expected   = 41
patch      = C3
